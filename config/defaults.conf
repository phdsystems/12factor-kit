# ==============================================================================
# 12-Factor Assessment Tool - Default Configuration
# ==============================================================================
# Default settings that can be overridden by environment variables
# ==============================================================================

# Assessment Configuration
DEFAULT_CHECK_DEPTH=3
DEFAULT_REPORT_FORMAT="terminal"
DEFAULT_VERBOSE="false"
DEFAULT_STRICT_MODE="false"
DEFAULT_GENERATE_REMEDIATION="false"

# Scoring Thresholds
EXCELLENT_THRESHOLD=80
GOOD_THRESHOLD=60
FAIR_THRESHOLD=40
POOR_THRESHOLD=20

# Factor Weights (optional future feature)
FACTOR_1_WEIGHT=1.0
FACTOR_2_WEIGHT=1.0
FACTOR_3_WEIGHT=1.0
FACTOR_4_WEIGHT=1.0
FACTOR_5_WEIGHT=1.0
FACTOR_6_WEIGHT=1.0
FACTOR_7_WEIGHT=1.0
FACTOR_8_WEIGHT=1.0
FACTOR_9_WEIGHT=1.0
FACTOR_10_WEIGHT=1.0
FACTOR_11_WEIGHT=1.0
FACTOR_12_WEIGHT=1.0

# File Patterns
DEPENDENCY_FILES="package.json requirements.txt go.mod Gemfile pom.xml Cargo.toml composer.json *.csproj"
CONFIG_FILES=".env .env.example config.yml config.yaml settings.json"
CI_FILES=".github/workflows/*.yml .gitlab-ci.yml Jenkinsfile .travis.yml bitbucket-pipelines.yml"

# Search Patterns
SECRET_PATTERNS="password|api_key|secret|token|credential"
ENV_VAR_PATTERNS="process.env|ENV|getenv|os.environ|System.getenv"
LOGGING_PATTERNS="console.log|print|logger|log.info|Log."

# Performance Settings
MAX_FILE_SIZE=1048576  # 1MB - Skip files larger than this
MAX_SEARCH_TIME=10     # seconds - Timeout for searches
CACHE_RESULTS="false"  # Cache assessment results

# Output Settings
SHOW_TIMESTAMPS="true"
SHOW_FULL_PATHS="false"
COLORIZE_OUTPUT="true"
UNICODE_SYMBOLS="true"

# Report Settings
INCLUDE_METADATA="true"
INCLUDE_REMEDIATION="true"
INCLUDE_EXAMPLES="false"
COMPRESS_JSON="false"

# Debug Settings
DEBUG_MODE="false"
TRACE_EXECUTION="false"
LOG_FILE="/dev/null"